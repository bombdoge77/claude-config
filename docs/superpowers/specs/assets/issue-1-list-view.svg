<svg width="720" height="460" xmlns="http://www.w3.org/2000/svg">
  <rect width="720" height="460" fill="#0d0d0b" rx="12"/>

  <g transform="translate(80, 36)">

    <!-- Title -->
    <text x="0" y="72" font-family="Georgia, serif" font-style="italic" font-weight="300" font-size="58" fill="#e2dcc8">tasks</text>
    <text x="134" y="72" font-family="Georgia, serif" font-style="italic" font-weight="300" font-size="58" fill="#c9a24a">.</text>

    <!-- Rule -->
    <line x1="0" y1="90" x2="560" y2="90" stroke="#252521" stroke-width="1"/>

    <!-- Input row -->
    <text x="0" y="120" font-family="sans-serif" font-size="13" fill="#58564f">new task...</text>
    <text x="544" y="120" font-family="sans-serif" font-size="15" fill="#58564f">→</text>
    <line x1="0" y1="132" x2="560" y2="132" stroke="#252521" stroke-width="1"/>

    <!-- Card 1 — amber, highlighted with gold border + annotation -->
    <rect x="0" y="144" width="560" height="52" rx="8" fill="#1f1a0e" stroke="#c9a24a" stroke-width="1.5"/>
    <circle cx="22" cy="170" r="8" fill="none" stroke="#58564f" stroke-width="1.5"/>
    <text x="44" y="175" font-family="sans-serif" font-size="13" fill="#e2dcc8">Schedule dentist appointment</text>
    <!-- notes dot indicator -->
    <circle cx="516" cy="170" r="3" fill="#c9a24a" opacity="0.6"/>
    <!-- annotation -->
    <text x="530" y="148" font-family="sans-serif" font-size="10" fill="#c9a24a">click to open ↓</text>
    <line x1="528" y1="152" x2="508" y2="162" stroke="#c9a24a" stroke-width="1" stroke-dasharray="3 2" opacity="0.6"/>

    <!-- Card 2 — sage -->
    <rect x="0" y="206" width="560" height="52" rx="8" fill="#0f1a11" stroke="#152817" stroke-width="1"/>
    <circle cx="22" cy="232" r="8" fill="none" stroke="#58564f" stroke-width="1.5"/>
    <text x="44" y="237" font-family="sans-serif" font-size="13" fill="#e2dcc8">Review pull request</text>

    <!-- Card 3 — slate, completed -->
    <rect x="0" y="268" width="560" height="52" rx="8" fill="#0e1219" stroke="#142030" stroke-width="1"/>
    <circle cx="22" cy="294" r="8" fill="#c9a24a" stroke="#c9a24a" stroke-width="1.5"/>
    <polyline points="17,294 21,298 28,288" fill="none" stroke="#0d0d0b" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="44" y="299" font-family="sans-serif" font-size="13" fill="#3a3933" text-decoration="line-through">Buy groceries</text>

    <!-- Card 4 — mauve -->
    <rect x="0" y="330" width="560" height="52" rx="8" fill="#160f1d" stroke="#23182d" stroke-width="1"/>
    <circle cx="22" cy="356" r="8" fill="none" stroke="#58564f" stroke-width="1.5"/>
    <text x="44" y="361" font-family="sans-serif" font-size="13" fill="#e2dcc8">Read the docs</text>

  </g>
</svg>
